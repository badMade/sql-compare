name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        secrets.ANTHROPIC_API_KEY != ''
      ) || (
        secrets.ANTHROPIC_API_KEY != '' && (
          (
            github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
            (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')
          ) ||
          (
            github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
            (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')
          ) ||
          (
            github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
            (github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'COLLABORATOR')
          ) ||
          (
            github.event_name == 'issues' && contains(github.event.issue.body, '@claude') &&
            (github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'COLLABORATOR')
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch,TodoWrite"
          review_prompt: |
            Review this PR thoroughly. Check for:
            - Correctness and potential bugs
            - Security vulnerabilities
            - Code style consistency
            - Test coverage gaps
            Provide actionable inline comments on specific lines where issues are found.
