name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches the full commit history, required to accurately compute diffs across branches
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              core.info('Comment on a regular issue, skipping.');
              return;
            }

            // Paginate through all PR files (up to 10 pages of 100 files each)
            let files = [];
            for (let page = 1; page <= 10; page++) {
              const { data: pageFiles } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
                page,
              });
              files = files.concat(pageFiles);
              if (pageFiles.length < 100) break;
              if (page === 10) {
                core.warning('PR has more than 1000 changed files; review will only cover the first 1000.');
              }
            }

            if (files.length === 0) {
              core.info('No changed files found, skipping review.');
              return;
            }

            const diff = files.map(f =>
              `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
            ).join('\n\n');
            core.setOutput('diff', diff);
            core.setOutput('pr_number', prNumber);

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const apiKey = process.env.OPENAI_API_KEY;
            if (!apiKey) {
              core.warning('Missing OPENAI_API_KEY secret — skipping Codex review.');
              return;
            }

            const diff = process.env.PR_DIFF || '';
            const prNumber = Number(process.env.PR_NUMBER);

            // If the diff step was skipped or returned early, both values will be absent.
            if (!diff.trim()) {
              core.info('No diff content found or previous step was skipped; nothing to review.');
              return;
            }

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            const openaiUrl = 'https://api.openai.com/v1/chat/completions';
            const response = await fetch(openaiUrl, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  {
                    role: 'system',
                    content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                  },
                  {
                    role: 'user',
                    content: `Please review this pull request diff:\n\n${diff}`
                  }
                ],
                max_tokens: 4096,
              }),
            });

            if (!response.ok) {
              const errorBody = await response.text();
              core.setFailed(`Codex review request failed (${response.status}) at ${openaiUrl}: ${errorBody}`);
              return;
            }

            const result = await response.json();
            const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Codex Review\n\n${review}`,
            });
