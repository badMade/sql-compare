name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on internal PRs or when @codex is mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ) &&
        github.event.issue.pull_request &&
        contains(github.event.issue.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fail = (message, error) => {
              if (error) core.error(`${message}: ${error.message}`); else core.error(message);
              core.setFailed(message);
            };

            try {
              const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
              if (!prNumber) return console.log('No PR number found, skipping.');

              if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
                return console.log('Comment not on a PR, skipping.');
              }

              // Fetch PR metadata
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              let files = [];
              let page = 1;
              while (page <= 10) {
                const { data: pageFiles } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                  page,
                });
                files = files.concat(pageFiles);
                if (pageFiles.length < 100) break;
                page++;
              }

              if (files.length === 0) {
                return console.log('No files found in PR, skipping review.');
              }

              const diff = files.map(f => `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`).join('\n\n');
              fs.writeFileSync('pr_diff.txt', diff);

              core.setOutput('pr_number', prNumber);
              core.setOutput('pr_title', pr.title);
              core.setOutput('pr_body', pr.body || '');
              console.log(`Successfully fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              fail('Failed to get PR diff', error);
            }

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.diff.outputs.pr_title }}
          PR_BODY: ${{ steps.diff.outputs.pr_body }}
        with:
          script: |
            const fs = require('fs');
            const fail = (message, error) => {
              if (error) core.error(`${message}: ${error.message}`); else core.error(message);
              core.setFailed(message);
            };

            try {
              const prNumber = process.env.PR_NUMBER;
              if (!prNumber) return console.log('No PR number, skipping review.');

              if (!process.env.OPENAI_API_KEY) {
                return fail('OPENAI_API_KEY is missing');
              }

              let diff;
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (e) {
                return fail('Could not read PR diff file', e);
              }

              console.log(`Sending PR #${prNumber} to Codex...`);
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are an expert code reviewer. Review the provided PR diff, considering the title and description for context. Identify bugs, security risks, and architectural improvements. Be specific, concise, and actionable.'
                    },
                    {
                      role: 'user',
                      content: `PR #${prNumber}: ${process.env.PR_TITLE}\n\nDescription:\n${process.env.PR_BODY}\n\nDiff:\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                }),
              });

              if (!response.ok) {
                const error = await response.text();
                throw new Error(`OpenAI API error (${response.status})`);
              }

              const result = await response.json();
              const review = result.choices?.[0]?.message?.content || 'No review generated.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prNumber),
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });
            } catch (error) {
              fail('Codex review failed', error);
            }
