name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const fail = (message, error) => {
              if (error) {
                core.error(`${message}: ${error.message}`);
              } else {
                core.error(message);
              }
              core.setFailed(message);
            };

            async function run() {
              try {
                const prNumber = context.payload.pull_request?.number ||
                  context.payload.issue?.number;
                if (!prNumber) {
                  fail('Could not determine PR number');
                  return;
                }

                if (
                  context.eventName === 'issue_comment' &&
                  !context.payload.issue.pull_request
                ) {
                  core.info('Comment on a regular issue; skipping review.');
                  return;
                }

                const files = [];
                const perPage = 100;
                let page = 1;

                // Fetch all file diffs with a small, deterministic page cap.
                while (true) {
                  const { data } = await github.rest.pulls.listFiles({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    per_page: perPage,
                    page,
                  });
                  files.push(...data);
                  if (data.length < perPage || page >= 10) {
                    break;
                  }
                  page += 1;
                }

                if (!files.length) {
                  core.info('No files changed; skipping review.');
                  return;
                }

                const diff = files.map(f => (
                  `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
                )).join('\n\n');

                core.setOutput('diff', diff);
                core.setOutput('pr_number', prNumber);
              } catch (error) {
                fail('Failed to collect PR diff', error);
              }
            }

            await run();

      - name: Review with Codex
        if: steps.diff.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const fail = (message, error) => {
              if (error) {
                core.error(`${message}: ${error.message}`);
              } else {
                core.error(message);
              }
              core.setFailed(message);
            };

            async function run() {
              try {
                const apiKey = process.env.OPENAI_API_KEY;
                const diff = process.env.PR_DIFF || '';
                const prNumber = Number(process.env.PR_NUMBER);

                if (!prNumber) {
                  fail('Invalid PR number');
                  return;
                }
                if (!apiKey) {
                  fail('Missing OPENAI_API_KEY');
                  return;
                }
                if (!diff) {
                  core.info('Empty diff; skipping review.');
                  return;
                }

                const response = await fetch(
                  'https://api.openai.com/v1/chat/completions',
                  {
                    method: 'POST',
                    headers: {
                      Authorization: `Bearer ${apiKey}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                      model: 'gpt-4o',
                      messages: [
                        {
                          role: 'system',
                          content: [
                            'You are a code reviewer.',
                            'Review the following PR diff.',
                            'Identify bugs, security issues, style problems,',
                            'and suggest improvements. Be concise and actionable.',
                          ].join(' '),
                        },
                        {
                          role: 'user',
                          content: `Please review this pull request diff:\n\n${diff}`,
                        },
                      ],
                      max_tokens: 4096,
                    }),
                  },
                );

                if (!response.ok) {
                  const details = await response.text();
                  fail(`Codex API request failed (${response.status})`, new Error(details));
                  return;
                }

                const result = await response.json();
                const review = result.choices?.[0]?.message?.content ||
                  'Unable to generate review.';

                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  event: 'COMMENT',
                  body: `## Codex Review\n\n${review}`,
                });
              } catch (error) {
                fail('Codex review step failed', error);
              }
            }

            await run();
