name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr_context
        uses: actions/github-script@v7
        with:
          script: |
            const { resolvePrContext } = require('./.github/workflows/scripts/ai_review_utils');
            await resolvePrContext({ core, github, context });

      - name: Review with Codex
        if: ${{ steps.pr_context.outputs.skip != 'true' && secrets.OPENAI_API_KEY != '' }}
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.pr_context.outputs.diff }}
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
        with:
          script: |
            const { fetchWithRetry, parseResponseBody, sanitizeError } = require('./.github/workflows/scripts/ai_review_utils');

            const apiKey = process.env.OPENAI_API_KEY;
            if (!apiKey) {
              core.setFailed('OPENAI_API_KEY secret is not configured.');
              return;
            }

            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(prNumber)) {
              core.setFailed('Invalid PR number provided to Codex step.');
              return;
            }

            const diff = process.env.PR_DIFF || '';
            if (!diff) {
              core.info('No diff content found; skipping Codex review.');
              return;
            }

            try {
              const response = await fetchWithRetry(
                'https://api.openai.com/v1/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o',
                    messages: [
                      {
                        role: 'system',
                        content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.',
                      },
                      {
                        role: 'user',
                        content: `Please review this pull request diff:\n\n${diff}`,
                      },
                    ],
                    max_tokens: 4096,
                  }),
                },
                { attempts: 3, initialDelayMs: 1500 },
              );

              const body = await parseResponseBody(response);
              if (!response.ok) {
                const message = (body && typeof body === 'object' && body.error?.message)
                  || (body && typeof body === 'object' && body.message)
                  || 'Codex API returned a non-success status.';
                core.setFailed(message);
                return;
              }

              const review = body && typeof body === 'object'
                ? body.choices?.[0]?.message?.content
                : undefined;

              if (!review) {
                core.setFailed('Codex response did not include review content.');
                return;
              }

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });
            } catch (error) {
              core.setFailed(`Codex review failed: ${sanitizeError(error)}`);
            }
