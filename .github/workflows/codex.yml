name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;

            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('Comment on a regular issue, skipping.');
              return;
            }

            try {
              console.log(`Fetching files for PR #${prNumber}...`);
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });

              console.log(`Fetched ${files.length} files.`);
              const diff = files.map(f =>
                `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary or no changes)'}`
              ).join('\n\n');

              const diffPath = `${process.env.GITHUB_WORKSPACE}/pr_diff.txt`;
              fs.writeFileSync(diffPath, diff);
              console.log(`Combined diff written to ${diffPath}`);

              console.log('Fetching PR metadata...');
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              core.setOutput('pr_number', prNumber);
              core.setOutput('pr_title', pr.title);
              core.setOutput('pr_body', pr.body || '');
            } catch (error) {
              core.setFailed(`Failed to prepare PR diff: ${error.message}`);
            }

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.diff.outputs.pr_title }}
          PR_BODY: ${{ steps.diff.outputs.pr_body }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR_NUMBER);
            const prTitle = process.env.PR_TITLE;
            const prBody = process.env.PR_BODY;

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            try {
              const diffPath = `${process.env.GITHUB_WORKSPACE}/pr_diff.txt`;
              if (!fs.existsSync(diffPath)) {
                core.setFailed('PR diff file not found');
                return;
              }
              const diff = fs.readFileSync(diffPath, 'utf8');

              console.log('Requesting review from OpenAI (gpt-4o)...');
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                    },
                    {
                      role: 'user',
                      content: `PR Title: ${prTitle}\nPR Description: ${prBody}\n\nPlease review this pull request diff:\n\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                }),
              });

              if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`OpenAI API error: ${response.status} ${JSON.stringify(errorData)}`);
              }

              const result = await response.json();
              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              console.log('Creating PR review comment...');
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });
              console.log('Review submitted successfully.');
            } catch (error) {
              core.setFailed(`Codex review failed: ${error.message}`);
            }
