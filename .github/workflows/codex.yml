name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run for PRs from the same repository or when explicitly mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to enable comprehensive diff analysis
          fetch-depth: 0

      - name: Validate API key
        id: validate
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::OPENAI_API_KEY is not set, skipping Codex review"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "::info::OPENAI_API_KEY is configured"
          fi

      - name: Get PR diff
        if: steps.validate.outputs.skip == 'false'
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;

            if (!prNumber) {
              core.info('Could not determine PR number, skipping');
              core.setOutput('skip', 'true');
              return;
            }

            core.info(`Processing PR #${prNumber}`);

            // Check if this is a regular issue comment (not on a PR)
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              core.info('Comment on a regular issue (not a PR), skipping');
              core.setOutput('skip', 'true');
              return;
            }

            core.info('Fetching PR files with pagination...');
            let allFiles = [];
            let page = 1;
            const perPage = 100;
            const maxPages = 10; // Limit to prevent excessive API calls

            // Paginate through all files in the PR
            while (page <= maxPages) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: perPage,
                  page: page,
                });

                if (files.length === 0) {
                  break;
                }

                allFiles = allFiles.concat(files);
                core.info(`Fetched ${files.length} files from page ${page}`);

                // If we got fewer files than requested, we've reached the end
                if (files.length < perPage) {
                  break;
                }

                page++;
              } catch (error) {
                core.warning(`Failed to fetch page ${page}: ${error.message}`);
                break;
              }
            }

            if (allFiles.length === 0) {
              core.info('No files found in PR, skipping');
              core.setOutput('skip', 'true');
              return;
            }

            core.info(`Total files fetched: ${allFiles.length}`);

            // Construct diff from all files
            const diff = allFiles.map(f =>
              `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary or no changes)'}`
            ).join('\n\n');

            core.setOutput('diff', diff);
            core.setOutput('pr_number', prNumber);
            core.setOutput('skip', 'false');

      - name: Review with Codex (OpenAI GPT-4)
        if: steps.validate.outputs.skip == 'false' && steps.diff.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            const prNumber = Number(process.env.PR_NUMBER);
            const apiKey = process.env.OPENAI_API_KEY;

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            if (!apiKey) {
              core.setFailed('OPENAI_API_KEY is not set');
              return;
            }

            if (!diff || diff.trim().length === 0) {
              core.info('No diff content to review');
              return;
            }

            core.info(`Sending review request to OpenAI API for PR #${prNumber}`);

            try {
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${apiKey}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                    },
                    {
                      role: 'user',
                      content: `Please review this pull request diff:\n\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                  temperature: 0.3,
                }),
              });

              if (!response.ok) {
                const errorText = await response.text();
                core.error(`OpenAI API request failed with status ${response.status}`);
                core.error(`Response: ${errorText.substring(0, 500)}`); // Log first 500 chars
                core.setFailed(`API request failed: ${response.status} ${response.statusText}`);
                return;
              }

              const result = await response.json();
              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              core.info('Review generated successfully');

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}\n\n_Originally posted by @github-actions[bot] in ${context.payload.pull_request?.html_url || context.payload.issue?.html_url}#pullrequestreview-codex_`,
              });

              core.info('Review posted successfully');
            } catch (error) {
              core.error(`Failed to complete review: ${error.message}`);
              core.error(`Error stack: ${error.stack}`);
              core.setFailed(`Review failed: ${error.message}`);
            }
