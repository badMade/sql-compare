name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on internal PRs or when @codex is mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ) &&
        github.event.issue.pull_request &&
        contains(github.event.issue.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              // 1. Validate GitHub context and determine PR number
              const prNumber = context.payload.pull_request?.number ||
                context.payload.issue?.number;

              if (!prNumber) {
                console.error('Could not determine PR number from context.');
                core.setFailed('Could not determine PR number');
                return;
              }

              // Skip if comment is on a regular issue (not a PR)
              if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
                console.log('Comment on a regular issue, skipping.');
                return;
              }

              // For issue_comment events the job-level if: cannot access head.repo.full_name,
              // so verify it here to prevent fork PRs from triggering the review with repo secrets.
              if (context.eventName === 'issue_comment') {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
                if (pr.head.repo.full_name !== baseRepo) {
                  console.log('PR is from a fork; skipping review to avoid exposing repo secrets.');
                  return;
                }
              }

              // 2. Fetch all changed files with pagination (capped at MAX_PAGES to avoid rate limits)
              const MAX_PAGES = 10;
              let files = [];
              let page = 1;
              while (true) {
                if (page > MAX_PAGES) {
                  core.setFailed(
                    `PR diff exceeds the ${MAX_PAGES}-page limit ` +
                    `(${MAX_PAGES * 100} files); aborting to avoid secondary rate limits.`
                  );
                  return;
                }
                try {
                  const { data: pageFiles } = await github.rest.pulls.listFiles({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    per_page: 100,
                    page,
                  });
                  files = files.concat(pageFiles);
                  if (pageFiles.length < 100) break;
                  page++;
                } catch (listError) {
                  const msg = listError && listError.message ? listError.message : String(listError);
                  core.setFailed(
                    `Failed to list files for pull request #${prNumber} on page ${page}: ${msg}`
                  );
                  return;
                }
              }

              // 3. Construct the diff string
              const diff = files.map(f =>
                `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
              ).join('\n\n');

              // 4. Save diff to file to avoid environment variable size limits
              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);

              console.log(`Successfully fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              console.error('Error fetching PR diff:', error);
              core.setFailed(`Failed to get PR diff: ${error.message}`);
            }

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.diff.outputs.pr_title }}
          PR_BODY: ${{ steps.diff.outputs.pr_body }}
        with:
          script: |
            const fs = require('fs');
            try {
              const prNumber = Number(process.env.PR_NUMBER);
              if (!prNumber) {
                console.error('Invalid PR number received from previous step.');
                core.setFailed('Invalid PR number');
                return;
              }

              // 1. Read diff from file with error handling
              let diff = '';
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (readError) {
                console.error('Error reading pr_diff.txt:', readError);
                core.setFailed('Could not read PR diff file');
                return;
              }

              // 2. Validate API key presence
              if (!process.env.OPENAI_API_KEY) {
                console.error('OPENAI_API_KEY is missing.');
                core.setFailed('OPENAI_API_KEY is not set');
                return;
              }

              console.log(`Sending PR #${prNumber} diff to OpenAI for review...`);

              // 3. Call OpenAI API
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a code reviewer. Review the following PR diff. ' +
                               'Identify bugs, security issues, style problems, and suggest improvements. ' +
                               'Be concise and actionable.'
                    },
                    {
                      role: 'user',
                      content: `Please review this pull request diff:\n\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                }),
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`OpenAI API responded with ${response.status}: ${errorText}`);
              }

              const result = await response.json();
              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              // 4. Create pull request review
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });

              console.log(`Successfully posted Codex review for PR #${prNumber}.`);
            } catch (error) {
              // Standardized error handling: log then fail
              console.error('Error during Codex review:', error);
              core.setFailed(`Review process failed: ${error.message}`);
            }
