name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')
      ) || (
        github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              core.info('Comment on a regular issue, skipping.');
              return;
            }

            let files = [];
            let page = 1;
            while (true) {
              const { data: filePage } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
                page: page,
              });
              files = files.concat(filePage);
              if (filePage.length < 100) break;
              page++;
            }
            const diff = files.map(f =>
              `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
            ).join('\n\n');
            const fs = require('fs');
            fs.writeFileSync(process.env.GITHUB_WORKSPACE + '/pr_diff.txt', diff);
            core.setOutput('pr_number', prNumber);

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/pr_diff.txt', 'utf8');
            const prNumber = Number(process.env.PR_NUMBER);

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('OPENAI_API_KEY is not set');
              return;
            }

            let result;
            try {
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                    },
                    {
                      role: 'user',
                      content: `Please review this pull request diff:\n\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                }),
              });

              if (!response.ok) {
                const errorBody = await response.text();
                core.error(`OpenAI API error: ${response.status} ${response.statusText}\nURL: ${response.url}\nBody: ${errorBody}`);
                core.setFailed(`OpenAI API call failed with status ${response.status}`);
                return;
              }

              result = await response.json();
            } catch (error) {
              core.error(`Failed to call OpenAI API: ${error.message}`);
              core.setFailed(`OpenAI API call failed: ${error.message}`);
              return;
            }

            const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Codex Review\n\n${review}`,
            });
