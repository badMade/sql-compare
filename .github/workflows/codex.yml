name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # Use full history so diff generation and labels remain accurate for forks and rebases.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load utilities
        id: utils
        uses: actions/github-script@v7
        with:
          script: |
            const { fetchPullRequestDiff } = require('./.github/scripts/review-utils');
            core.setOutput('loaded', Boolean(fetchPullRequestDiff));

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const { fetchPullRequestDiff } = require('./.github/scripts/review-utils');

            try {
              const { prNumber, diff, files } = await fetchPullRequestDiff({ github, context, core });

              if (!diff) {
                core.setFailed('No diff available');
                return;
              }

              core.info(`Prepared diff for PR #${prNumber} with ${files.length} files.`);
              core.setOutput('diff', diff);
              core.setOutput('pr_number', prNumber);
            } catch (error) {
              const message = error && error.message ? error.message : String(error);
              core.setFailed(`Failed to build diff: ${message}`);
            }

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            const prNumber = Number(process.env.PR_NUMBER);

            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('OPENAI_API_KEY is required');
              return;
            }

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            core.info(`Submitting diff for PR #${prNumber} to OpenAI API`);

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  {
                    role: 'system',
                    content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                  },
                  {
                    role: 'user',
                    content: `Please review this pull request diff:\n\n${diff}`
                  }
                ],
                max_tokens: 4096,
              }),
            });

            if (!response.ok) {
              core.setFailed(`OpenAI API request failed with status ${response.status} ${response.statusText}`);
              core.debug(`Request URL: ${response.url}`);
              return;
            }

            const result = await response.json();
            const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

            core.info('Received response from OpenAI API');

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Codex Review\n\n${review}`,
            });
