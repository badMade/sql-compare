name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on internal PRs or when @codex is mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') ||
          contains(github.event.pull_request.body, '@codex') ||
          contains(github.event.pull_request.title, '@codex')
        )
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ) &&
        github.event.issue.pull_request
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const {
              buildDiffString,
              fetchPrFilesWithPagination,
              parsePrNumber,
              safeErrorMessage,
            } = require('./.github/actions/review-utils');

            try {
              if (context.eventName === 'issue_comment' && !context.payload.issue?.pull_request) {
                core.info('Comment on a regular issue; skipping Codex review.');
                return;
              }

              const prNumber = parsePrNumber(context.payload);
              const files = await fetchPrFilesWithPagination(github, context, prNumber, core);
              const diff = buildDiffString(files);

              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);
              core.setOutput('pr_title', pr.title);
              core.setOutput('pr_body', pr.body);

              core.info(`Fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              const message = safeErrorMessage(error);
              core.error(`Error fetching PR diff: ${message}`);
              core.setFailed(`Failed to get PR diff: ${message}`);
            }

      - name: Review with Codex
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.diff.outputs.pr_title }}
          PR_BODY: ${{ steps.diff.outputs.pr_body }}
        with:
          script: |
            const fs = require('fs');
            const {
              fetchWithRetry,
              isJsonResponse,
              normalizePrNumber,
              safeErrorMessage,
              safeReadBody,
            } = require('./.github/actions/review-utils');

            try {
              const prNumber = normalizePrNumber(process.env.PR_NUMBER);

              let diff;
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (readError) {
                const message = safeErrorMessage(readError);
                core.setFailed(`Could not read PR diff file: ${message}`);
                return;
              }

              if (!process.env.OPENAI_API_KEY) {
                core.setFailed('OPENAI_API_KEY is not set');
                return;
              }

              core.info(`Sending PR #${prNumber} diff to OpenAI for review...`);

              const response = await fetchWithRetry(
                () =>
                  fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                      Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                      model: 'gpt-4o',
                      messages: [
                        {
                          role: 'system',
                          content:
                            'You are a code reviewer. Review the following PR diff. ' +
                            'Identify bugs, security issues, style problems, and suggest improvements. ' +
                            'Be concise and actionable.',
                        },
                        {
                          role: 'user',
                          content: `Please review this pull request diff:\n\n${diff}`,
                        },
                      ],
                      max_tokens: 4096,
                    }),
                  }),
                { retries: 2, delayMs: 2000 }
              );

              if (!response?.ok) {
                const errorText = await safeReadBody(response);
                throw new Error(`OpenAI API responded with ${response?.status}: ${errorText}`);
              }

              if (!isJsonResponse(response)) {
                const bodyText = await safeReadBody(response);
                throw new Error(`OpenAI API returned non-JSON response: ${bodyText}`);
              }

              // Parse JSON response with content-type validation
              const result = await parseJsonResponse(response);
              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });

              core.info(`Successfully posted Codex review for PR #${prNumber}.`);
            } catch (error) {
              const message = safeErrorMessage(error);
              core.error(`Error during Codex review: ${message}`);
              core.setFailed(`Review process failed: ${message}`);
            }
