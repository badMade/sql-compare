name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize, edited]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on internal PRs or when @codex is mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') ||
          contains(github.event.pull_request.body, '@codex') ||
          contains(github.event.pull_request.title, '@codex')
        )
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ) &&
        github.event.issue.pull_request
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fail = (message, error) => {
              if (error) core.error(`${message}: ${error.message}`);
              else core.error(message);
              core.setFailed(message);
            };

            try {
              const prNumber = context.payload.pull_request?.number ||
                context.payload.issue?.number;

              if (!prNumber) {
                return fail('Could not determine PR number');
              }

              if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
                console.log('Comment on a regular issue, skipping.');
                return;
              }

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              let files = [];
              let page = 1;
              while (page <= 10) {
                const { data: pageFiles } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                  page: page,
                });
                files = files.concat(pageFiles);
                if (pageFiles.length < 100) break;
                page++;
              }

              if (files.length === 0) {
                console.log('No files changed in this PR.');
                return;
              }

              const diff = files.map(f =>
                `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
              ).join('\n\n');

              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);
              core.setOutput('pr_title', pr.title);
              core.setOutput('pr_body', pr.body);

              console.log(`Successfully fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              fail('Failed to get PR diff', error);
            }

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.diff.outputs.pr_title }}
          PR_BODY: ${{ steps.diff.outputs.pr_body }}
        with:
          script: |
            const fs = require('fs');
            const fail = (message, error) => {
              if (error) core.error(`${message}: ${error.message}`);
              else core.error(message);
              core.setFailed(message);
            };

            try {
              const prNumber = Number(process.env.PR_NUMBER);
              if (!prNumber) {
                console.log('No PR number provided. Possibly skipped file fetch.');
                return;
              }

              let diff = '';
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (readError) {
                return fail('Could not read PR diff file', readError);
              }

              if (!process.env.OPENAI_API_KEY) {
                core.warning('OPENAI_API_KEY is missing. Skipping Codex review.');
                return;
              }

              console.log(`Sending PR #${prNumber} diff to OpenAI for review...`);

              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a code reviewer. Review the following PR. ' +
                               'Identify bugs, security issues, style problems, and suggest improvements. ' +
                               'Be concise and actionable.'
                    },
                    {
                      role: 'user',
                      content: `Title: ${process.env.PR_TITLE}\nBody: ${process.env.PR_BODY}\n\nDiff:\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                }),
              });

              if (!response.ok) {
                const errorText = await response.text();
                if (response.status === 401 || response.status === 403) {
                  core.warning(`OpenAI API auth error (${response.status}): ${errorText}. Check your API key permissions.`);
                  return;
                }
                throw new Error(`OpenAI API responded with ${response.status}: ${errorText}`);
              }

              const result = await response.json();
              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });

              console.log(`Successfully posted Codex review for PR #${prNumber}.`);
            } catch (error) {
              fail('Review process failed', error);
            }
