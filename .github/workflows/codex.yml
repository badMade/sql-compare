name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on internal PRs or when @codex is mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ) &&
        github.event.issue.pull_request &&
        contains(github.event.issue.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const { getPrNumber, getPrDiff, fail } = require('./.github/scripts/ai-review-lib.js');
            try {
              const prNumber = getPrNumber(context);
              if (!prNumber) {
                console.log('Could not determine PR number, skipping.');
                return;
              }

            try {
              if (context.eventName === 'issue_comment' && !context.payload.issue?.pull_request) {
                core.info('Comment on a regular issue; skipping Codex review.');
                return;
              }

              const diff = await getPrDiff(github, context, prNumber);
              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);
              console.log(`Successfully fetched diff for PR #${prNumber}.`);
            } catch (error) {
              fail(core, 'Failed to get PR diff', error);
            }

      - name: Review with Codex
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const review = require('./.github/scripts/codex-review.js');
            await review({ github, context, core });
