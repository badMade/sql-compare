name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const { buildDiff } = require('./.github/scripts/build-pr-diff');

            const prNumber =
              context.payload.pull_request?.number || context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            if (
              context.eventName === 'issue_comment' &&
              !context.payload.issue.pull_request
            ) {
              console.log('Comment on a regular issue, skipping.');
              return;
            }

            try {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const diff = buildDiff(files);
              if (!diff) {
                core.warning('No file diffs found for this PR.');
              }

              core.setOutput('diff', diff);
              core.setOutput('pr_number', prNumber);
              core.info(`Collected ${files.length} file diff(s) for PR #${prNumber}`);
            } catch (error) {
              core.setFailed(`Failed to collect PR diffs: ${error.message}`);
            }

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            const prNumber = Number(process.env.PR_NUMBER);

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            if (!diff) {
              core.setFailed('No diff content available to review.');
              return;
            }

            try {
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content:
                        'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.',
                    },
                    {
                      role: 'user',
                      content: `Please review this pull request diff:\n\n${diff}`,
                    },
                  ],
                  max_tokens: 4096,
                }),
              });

              if (!response.ok) {
                const body = await response.text();
                throw new Error(`OpenAI API error ${response.status}: ${body}`);
              }

              const result = await response.json();
              const review =
                result.choices?.[0]?.message?.content || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });

              core.info('Codex review posted successfully.');
            } catch (error) {
              core.setFailed(`Failed to complete Codex review: ${error.message}`);
            }
