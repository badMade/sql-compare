name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const utils = require('./.github/scripts/utils.js');

            try {
              if (typeof utils.shouldTrigger === 'function' && !utils.shouldTrigger(context, '@codex')) {
                return;
              }

              const { prNumber, diff } = await utils.getPrInfo(github, context);
              if (!prNumber) return;

              if (!process.env.OPENAI_API_KEY) {
                console.log('OPENAI_API_KEY is missing, skipping review.');
                return;
              }

              const result = await utils.callAiApi(
                'https://api.openai.com/v1/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o',
                    messages: [
                      {
                        role: 'system',
                        content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                      },
                      {
                        role: 'user',
                        content: `Please review this pull request diff:\n\n${diff}`
                      }
                    ],
                    max_tokens: 4096,
                  }),
                }
              );

              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });
            } catch (error) {
              core.setFailed(`Codex review failed: ${utils.formatError(error)}`);
            }
