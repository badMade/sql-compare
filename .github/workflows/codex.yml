name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) || (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@codex')
        ) || (
          github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@codex') &&
          github.event.pull_request.head.repo.full_name == github.repository
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr-context
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            if (!Number.isInteger(prNumber)) {
              core.setFailed('Could not determine pull request number.');
              return;
            }

            if (context.eventName === 'issue_comment' && !context.payload.issue?.pull_request) {
              core.info('Comment is on a regular issue; skipping Codex review.');
              return;
            }

            let pullRequest;
            try {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              pullRequest = response.data;
            } catch (error) {
              if (error && error.status === 404) {
                core.info(`Pull request #${prNumber} not found; skipping Codex review.`);
                return;
              }
              const message = error && error.message ? error.message : String(error);
              core.setFailed(`Failed to fetch pull request #${prNumber}: ${message}`);
              return;
            }

            if (pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.info('Pull request originates from a fork; skipping Codex review.');
              return;
            }

            core.setOutput('pr_number', String(prNumber));

      - name: Get PR diff
        id: diff
        if: steps.pr-context.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr-context.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prNumber = Number.parseInt(process.env.PR_NUMBER || '', 10);
            if (!Number.isInteger(prNumber)) {
              core.setFailed('Invalid pull request number.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const diff = files.map((file) => (
              `--- ${file.filename}\n+++ ${file.filename}\n${file.patch || '(binary)'}`
            )).join('\n\n');
            const diffPath = path.join(process.env.GITHUB_WORKSPACE, 'codex-pr-diff.txt');
            fs.writeFileSync(diffPath, diff, 'utf8');
            core.setOutput('diff_path', diffPath);

      - name: Review with Codex
        if: steps.pr-context.outputs.pr_number != '' && steps.diff.outputs.diff_path != ''
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF_PATH: ${{ steps.diff.outputs.diff_path }}
          PR_NUMBER: ${{ steps.pr-context.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number.parseInt(process.env.PR_NUMBER || '', 10);
            if (!Number.isInteger(prNumber)) {
              core.setFailed('Invalid pull request number.');
              return;
            }

            const diffPath = process.env.PR_DIFF_PATH || '';
            if (!diffPath || !fs.existsSync(diffPath)) {
              core.setFailed('PR diff file is not available.');
              return;
            }

            if (!process.env.OPENAI_API_KEY) {
              core.info('OpenAI API key is not configured; skipping Codex review.');
              return;
            }

            const diff = fs.readFileSync(diffPath, 'utf8');
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  {
                    role: 'system',
                    content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.',
                  },
                  {
                    role: 'user',
                    content: `Please review this pull request diff:\n\n${diff}`,
                  },
                ],
                max_tokens: 4096,
              }),
            });

            if (!response.ok) {
              const errorBody = await response.text();
              core.setFailed(`OpenAI review request failed (${response.status}): ${errorBody}`);
              return;
            }

            const result = await response.json();
            const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Codex Review\n\n${review}`,
            });
