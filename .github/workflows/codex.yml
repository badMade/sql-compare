name: Codex Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on PRs from the same repo; for comments, require the @codex mention
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve the PR number from whichever event triggered the workflow
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            // Skip regular issue comments that are not on a pull request
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('Comment on a regular issue, skipping.');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const diff = files.map(f =>
              `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
            ).join('\n\n');
            core.setOutput('diff', diff);
            core.setOutput('pr_number', String(prNumber));

      - name: Review with Codex
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            // Helper: extract a safe, non-sensitive error message string
            function getErrorMessage(err) {
              return (err && err.message) ? err.message : String(err);
            }

            const diff = process.env.PR_DIFF || '';

            // Validate that the API key is present before attempting any network call
            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('OPENAI_API_KEY secret is not configured');
              return;
            }

            // Validate PR number once; parseInt handles leading/trailing whitespace
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed('Invalid PR number');
              return;
            }

            // Call the OpenAI Chat Completions API; wrap in try/catch to handle
            // network failures or unexpected response formats gracefully
            let response;
            try {
              response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.'
                    },
                    {
                      role: 'user',
                      content: `Please review this pull request diff:\n\n${diff}`
                    }
                  ],
                  max_tokens: 4096,
                }),
              });
            } catch (networkErr) {
              core.setFailed(`Network error calling OpenAI API: ${getErrorMessage(networkErr)}`);
              return;
            }

            // Check Content-Type before attempting JSON parse to avoid errors on
            // unexpected response formats (e.g. HTML error pages or binary bodies)
            const contentType = response.headers.get('content-type') || '';
            if (!response.ok || !contentType.includes('application/json')) {
              const body = await response.text();
              core.setFailed(`OpenAI API error (HTTP ${response.status}): ${body.slice(0, 100)}`);
              return;
            }

            let result;
            try {
              result = await response.json();
            } catch (parseErr) {
              core.setFailed(`Failed to parse OpenAI API response: ${getErrorMessage(parseErr)}`);
              return;
            }

            const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Codex Review\n\n${review}`,
            });
