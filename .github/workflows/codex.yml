name: Codex Review

on:
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run on internal PRs or when @codex is mentioned
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ) &&
        github.event.issue.pull_request &&
        contains(github.event.issue.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const {
              buildDiffString,
              safeErrorMessage,
              truncateMessage,
              validatePrNumber,
            } = require('./.github/actions/review-utils');

            const MAX_PAGES = 10;
            const PER_PAGE = 100;

            function formatError(error) {
              return truncateMessage(safeErrorMessage(error));
            }

            function validateAndParsePr(payload) {
              const rawNumber = payload?.pull_request?.number ?? payload?.issue?.number;
              const parsed = parseInt(rawNumber, 10);
              if (!Number.isInteger(parsed) || parsed <= 0) {
                throw new Error('Invalid pull request number.');
              }
              return validatePrNumber(parsed);
            }

            try {
              if (context.eventName === 'issue_comment' && !context.payload.issue?.pull_request) {
                core.info('Comment on a regular issue; skipping Codex review.');
                return;
              }

              const prNumber = validateAndParsePr(context.payload);
              let page = 1;
              const files = [];
              while (page <= MAX_PAGES) {
                const { data: pageFiles } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: PER_PAGE,
                  page,
                });

                files.push(...pageFiles);

                if (pageFiles.length < PER_PAGE) {
                  break;
                }

                page += 1;
              }

              if (page > MAX_PAGES && files.length && files.length % PER_PAGE === 0) {
                throw new Error(`Reached MAX_PAGES (${MAX_PAGES}) while fetching PR files.`);
              }

              const diff = buildDiffString(files);

              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);

              core.info(`Fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              const message = formatError(error);
              core.error(`Error fetching PR diff: ${message}`);
              core.setFailed(`Failed to get PR diff: ${message}`);
            }

      - name: Review with Codex
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.diff.outputs.pr_title }}
          PR_BODY: ${{ steps.diff.outputs.pr_body }}
        with:
          script: |
            const fs = require('fs');
            const {
              fetchWithRetry,
              isJsonResponse,
              parseJsonResponse,
              normalizePrNumber,
              safeErrorMessage,
              safeReadBody,
            } = require('./.github/actions/review-utils');

            const truncate = (value, max = 500) => {
              const text = typeof value === 'string' ? value : value ? String(value) : '';
              return text.length > max ? `${text.substring(0, max)}...` : text;
            };

            const formatError = (error) => truncate(safeErrorMessage(error));

            async function ensureJson(response) {
              return parseJsonResponse(response);
            }

            try {
              const prNumber = normalizePrNumber(process.env.PR_NUMBER);

              let diff;
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (readError) {
                const message = safeErrorMessage(readError);
                core.setFailed(`Could not read PR diff file: ${message}`);
                return;
              }

              if (!process.env.OPENAI_API_KEY) {
                core.setFailed('OPENAI_API_KEY is not set');
                return;
              }

              core.info(`Sending PR #${prNumber} diff to OpenAI for review...`);

              const response = await fetchWithRetry(
                () =>
                  fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                      Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                      model: 'gpt-4o',
                      messages: [
                        {
                          role: 'system',
                          content:
                            'You are a code reviewer. Review the following PR diff. ' +
                            'Identify bugs, security issues, style problems, and suggest improvements. ' +
                            'Be concise and actionable.',
                        },
                        {
                          role: 'user',
                          content: `Please review this pull request diff:\n\n${diff}`,
                        },
                      ],
                      max_tokens: 4096,
                    }),
                  }),
                { maxRetries: 2, delayMs: 2000 }
              );

              if (!response?.ok) {
                const errorText = await safeReadBody(response);
                throw new Error(`OpenAI API responded with ${response?.status}: ${errorText}`);
              }

              if (!isJsonResponse(response)) {
                const bodyText = await safeReadBody(response);
                throw new Error(
                  `OpenAI API returned non-JSON response with content-type ${
                    response?.headers?.get?.('content-type') || 'missing'
                  }: ${truncate(bodyText)}`
                );
              }

              // Parse JSON response with content-type validation
              const result = await ensureJson(response);
              const review = result.choices?.[0]?.message?.content || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Codex Review\n\n${review}`,
              });

              core.info(`Successfully posted Codex review for PR #${prNumber}.`);
            } catch (error) {
              const message = formatError(error);
              core.error(`Error during Codex review: ${message}`);
              core.setFailed(`Review process failed: ${message}`);
            }
