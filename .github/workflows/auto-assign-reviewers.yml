name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const teamReviewers = ['team_reviewers'];
            const prNumber = context.payload.pull_request.number;

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                team_reviewers: teamReviewers,
              });
              console.log('Requested reviews from teams: ' + teamReviewers.join(', '));
            } catch (error) {
              const errorMessage = error?.message || String(error);

              // Log the low-level error for workflow debugging, then mark the
              // action as failed with a concise message for the job summary.
              console.error('Reviewer assignment request failed:', errorMessage);
              core.setFailed('Failed to assign reviewers.');
            }
