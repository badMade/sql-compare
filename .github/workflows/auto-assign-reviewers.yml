name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const reviewers = ['badMade']; // Add valid collaborator usernames here
            const prNumber = context.payload.pull_request?.number;
            const prAuthor = context.payload.pull_request?.user?.login;

            if (!prNumber) {
              core.setFailed('No pull request number found in payload.');
              return;
            }

            const validReviewers = reviewers.filter(r => r !== prAuthor);

            if (validReviewers.length === 0) {
              core.info('No valid reviewers left after filtering (PR author excluded).');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: validReviewers,
              });
              core.info(`Requested reviews from users: ${validReviewers.join(', ')}`);
            } catch (error) {
              const errorMessage = error?.message || String(error);
              core.error(`Failed to assign reviewers: ${errorMessage}`);
              core.setFailed(`Failed to assign reviewers: ${errorMessage}`);
            }
