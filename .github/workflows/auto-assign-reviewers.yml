name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const defaultReviewers = ['badMade']; // Add valid collaborator usernames here
            const prNumber = context.payload.pull_request?.number;
            const prAuthor = context.payload.pull_request?.user?.login;

            // Filter out the PR author to prevent API 422 errors
            const reviewers = defaultReviewers.filter(user => user !== prAuthor);

            if (!prNumber) {
              core.setFailed('No pull request number found in payload.');
              return;
            }

            if (!Array.isArray(reviewers) || reviewers.length === 0) {
              core.info('No reviewers specified; skipping assignment.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers,
              });
              core.info(`Requested reviews from users: ${reviewers.join(', ')}`);
            } catch (error) {
              const errorMessage = (error?.message || String(error)).slice(0, 500);
              core.error(`Failed to assign reviewers: ${errorMessage}`);
              core.setFailed(`Failed to assign reviewers: ${errorMessage}`);
            }
