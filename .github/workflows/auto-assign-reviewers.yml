name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const teamReviewers = ['team_reviewers'];
            const prNumber = context.payload.pull_request?.number;

            async function getValidTeams(github, context, requestedTeams) {
              const validTeams = [];
              const skippedTeams = [];

              for (const team of requestedTeams) {
                try {
                  await github.rest.teams.getByName({
                    org: context.repo.owner,
                    team_slug: team,
                  });

                  await github.rest.teams.checkPermissionsForRepoInOrg({
                    org: context.repo.owner,
                    team_slug: team,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                  });

                  validTeams.push(team);
                } catch (error) {
                  skippedTeams.push(team);
                  console.log(`Skipping team review request due to validation failure: ${error.message}`);
                }
              }

              return { validTeams, skippedTeams };
            }

            if (prNumber === undefined) {
              const errorMessage = 'Pull request number not found in the event payload.';
              console.error(errorMessage);
              core.setFailed(errorMessage);
              return;
            }

            const { validTeams, skippedTeams } = await getValidTeams(github, context, teamReviewers);

            if (validTeams.length === 0) {
              console.log(`No valid collaborator teams found to request reviews from. Skipping. Invalid teams count: ${skippedTeams.length}.`);
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                team_reviewers: validTeams,
              });
              console.log('Requested reviews from teams: ' + validTeams.join(', '));
            } catch (error) {
              console.error('Failed to assign reviewers: ' + (error && error.message ? error.message : String(error)));
              core.setFailed('Failed to assign reviewers: ' + (error && error.message ? error.message : String(error)));
            }
