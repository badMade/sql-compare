name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const { requestTeamReviews } = require('./.github/scripts/auto-assign-reviewers.js');
            const teamReviewers = ['maintainers', 'reviewers'];

            await requestTeamReviews({
              github,
              context,
              core,
              teamReviewers,
            });
