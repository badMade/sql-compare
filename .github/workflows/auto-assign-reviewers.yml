name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Checkout is required so github-script can load ./.github/scripts/utils.js
      - name: Check out repository
        # Required so github-script can load .github/scripts/utils.js from the workspace.
        uses: actions/checkout@v4
      - name: Request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const utils = require('./.github/scripts/utils.js');
            const teamReviewers = ['team_reviewers'];
            const prNumber = context.payload.pull_request.number;
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                team_reviewers: teamReviewers,
              });
              console.log('Requested reviews from teams: ' + teamReviewers.join(', '));
            } catch (error) {
              const formattedError = utils.formatError(error);
              console.error('Failed to assign reviewers: ' + formattedError);
              core.setFailed('Failed to assign reviewers: ' + formattedError);
            }
