name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const teamReviewers = []; // Add team names here
            const prNumber = context.payload.pull_request.number;

            if (teamReviewers.length === 0) {
              console.log('No team reviewers specified, skipping.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                team_reviewers: teamReviewers,
              });
              console.log('Requested reviews from teams: ' + teamReviewers.join(', '));
            } catch (error) {
              console.error('Failed to assign reviewers: ' + (error && error.message ? error.message : String(error)));
              core.setFailed('Failed to assign reviewers: ' + (error && error.message ? error.message : String(error)));
            }
