name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const reviewers = []; // Add individual collaborator usernames here

            if (!context.payload.pull_request) {
              core.warning('No pull_request payload found, skipping reviewer assignment.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            if (reviewers.length === 0) {
              core.info('No reviewers specified, skipping.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: reviewers,
              });
              core.info(`Requested reviews from users: ${reviewers.join(', ')}`);
            } catch (error) {
              const errorMessage = error && error.message ? error.message : String(error);

              // Log the low-level error for workflow debugging, then mark the
              // action as failed with a concise message for the job summary.
              core.error(`Reviewer assignment request failed: ${errorMessage.slice(0, 500)}`);
              core.setFailed('Failed to assign reviewers.');
            }
