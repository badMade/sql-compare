name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-reviewers:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            // Helper function to check if a team is a valid collaborator
            async function isTeamCollaborator(github, context, teamSlug) {
              try {
                await github.rest.teams.getByName({
                  org: context.repo.owner,
                  team_slug: teamSlug,
                });

                await github.rest.teams.checkPermissionsForRepoInOrg({
                  org: context.repo.owner,
                  team_slug: teamSlug,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });

                return { valid: true };
              } catch (error) {
                const status = error && error.status;
                if (status === 404 || status === 422) {
                  return { valid: false, reason: 'not_found_or_no_access' };
                } else {
                  // Log only status code and message, not full error object
                  console.error(`Unexpected error checking team '${teamSlug}': status ${status}`);
                  throw error;
                }
              }
            }

            // Validate pull request data is available
            if (!context.payload.pull_request) {
              core.setFailed('Pull request data not found in payload');
              return;
            }

            const pullRequestNumber = context.payload.pull_request.number;
            if (!pullRequestNumber) {
              core.setFailed('Pull request number not found in payload');
              return;
            }

            const configuredTeamSlugs = ['team_reviewers'];

            // Filter teams to only those that are valid collaborators
            const collaboratorTeamSlugs = [];
            for (const teamSlug of configuredTeamSlugs) {
              const result = await isTeamCollaborator(github, context, teamSlug);
              if (result.valid) {
                collaboratorTeamSlugs.push(teamSlug);
              } else {
                console.log(`Skipping team '${teamSlug}': ${result.reason}`);
              }
            }

            if (collaboratorTeamSlugs.length === 0) {
              console.log('No valid collaborator teams found to request reviews from. Skipping.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequestNumber,
                team_reviewers: collaboratorTeamSlugs,
              });
              console.log(`Requested reviews from teams: ${collaboratorTeamSlugs.join(', ')}`);
            } catch (error) {
              const errorMessage = error && error.message ? error.message : 'Unknown error';
              console.error(`Failed to assign reviewers: ${errorMessage}`);
              core.setFailed(`Failed to assign reviewers: ${errorMessage}`);
            }
