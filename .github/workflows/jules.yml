name: Jules Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Jules
        uses: actions/github-script@v7
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          script: |
            const utils = require('./.github/scripts/utils.js');

            try {
              if (typeof utils.shouldTrigger === 'function' && !utils.shouldTrigger(context, '@jules')) {
                return;
              }

              const { prNumber, diff } = await utils.getPrInfo(github, context);
              if (!prNumber) return;

              // Security check for labels on pull_request events
              if (context.eventName === 'pull_request') {
                const labels = context.payload.pull_request.labels.map(l => l.name);
                if (!labels.includes('safe-for-ai-review')) {
                  console.log('PR is not labeled safe-for-ai-review, skipping review.');
                  return;
                }
              }

              if (!process.env.GOOGLE_API_KEY) {
                console.log('GOOGLE_API_KEY is missing, skipping review.');
                return;
              }

              const response = await utils.callAiApi(
                'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': process.env.GOOGLE_API_KEY,
                  },
                  body: JSON.stringify({
                    contents: [{
                      parts: [{
                        text: `You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.\n\nPR Diff:\n${diff}`
                      }]
                    }],
                    generationConfig: { maxOutputTokens: 4096 },
                  }),
                }
              );

              const review = response.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Jules Review\n\n${review}`,
              });
            } catch (error) {
              core.setFailed(`Jules review failed: ${utils.formatError(error)}`);
            }
