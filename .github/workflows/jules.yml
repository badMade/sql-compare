name: Jules Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    # Trigger on PR open from same repo, or when @jules is mentioned in comments
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            // Helper: Format error messages without exposing sensitive data
            function formatError(error) {
              const message = error && error.message ? error.message : String(error);
              // Truncate to prevent log flooding, but don't expose length-based info in user-facing errors
              return message.substring(0, 500);
            }

            // Helper: Validate and parse PR number
            function getPrNumber(context) {
              const rawPrNumber = context.payload.pull_request?.number ||
                context.payload.issue?.number;

              if (!rawPrNumber) {
                return null;
              }

              const prNumber = parseInt(rawPrNumber, 10);
              return Number.isInteger(prNumber) && prNumber > 0 ? prNumber : null;
            }

            try {
              const prNumber = getPrNumber(context);

              if (!prNumber) {
                core.setFailed('Could not determine PR number');
                return;
              }

              // Skip if this is a comment on a regular issue (not a PR)
              if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
                console.log('Comment on a regular issue, skipping.');
                return;
              }

              // Fetch PR diff with error handling
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const diff = files.map(f =>
                `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
              ).join('\n\n');

              core.setOutput('diff', diff);
              core.setOutput('pr_number', prNumber);
            } catch (error) {
              core.setFailed(`Failed to fetch PR diff: ${formatError(error)}`);
              throw error;
            }

      - name: Review with Jules
        uses: actions/github-script@v7
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            // Helper: Format error messages without exposing sensitive data
            function formatError(error) {
              const message = error && error.message ? error.message : String(error);
              return message.substring(0, 500);
            }

            try {
              const diff = process.env.PR_DIFF || '';
              const prNumber = Number(process.env.PR_NUMBER);

              if (!prNumber) {
                core.setFailed('Invalid PR number');
                return;
              }

              // Call Gemini API with proper error handling
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GOOGLE_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{
                      parts: [{
                        text: `You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.\n\nPR Diff:\n${diff}`
                      }]
                    }],
                    generationConfig: { maxOutputTokens: 4096 },
                  }),
                }
              );

              // Check response status before parsing
              if (!response.ok) {
                const contentType = response.headers.get('content-type');
                let errorBody = 'Unknown error';

                // Only parse as text if content-type suggests text
                if (contentType && contentType.includes('application/json')) {
                  const errorData = await response.json();
                  errorBody = errorData.error?.message || JSON.stringify(errorData);
                } else if (contentType && contentType.includes('text')) {
                  errorBody = await response.text();
                }

                throw new Error(`Gemini API request failed: ${response.status} - ${errorBody.substring(0, 200)}`);
              }

              const result = await response.json();
              const review = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

              // Post review to PR
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Jules Review\n\n${review}`,
              });
            } catch (error) {
              // Ensure errors don't expose API keys or sensitive info
              const safeError = formatError(error);
              core.setFailed(`Review failed: ${safeError}`);
              throw error;
            }
