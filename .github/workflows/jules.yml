name: Jules Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('Comment on a regular issue, skipping.');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            fs.writeFileSync(process.env.GITHUB_WORKSPACE + '/pr_diff.txt', diff);

    if: |
      secrets.GOOGLE_API_KEY != '' && (
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) || (
          (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
          (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
        )
      )
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
      )
                      text: `You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.\n\nPR Diff:\n${diff}`
                    }]
                  }],
                  generationConfig: { maxOutputTokens: 4096 },
                }),
              }
            );

            const result = await response.json();
            const review = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Jules Review\n\n${review}`,
            });
