name: Jules Review

on:
  pull_request:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    # Run only on internal PRs with the label, OR when @jules is mentioned.
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@jules') &&
        contains(github.event.issue.labels.*.name, 'safe-for-ai-review') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@jules') &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            try {
              // 1. Determine PR number from context
              const prNumber = context.payload.pull_request?.number ||
                context.payload.issue?.number;

              if (!prNumber) {
                console.error('Could not determine PR number from context.');
                core.setFailed('Could not determine PR number');
                return;
              }

              // Skip if comment is on a regular issue
              if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
                console.log('Comment on a regular issue, skipping.');
                return;
              }

              // 2. Fetch files with pagination
              let files = [];
              let page = 1;
              while (true) {
                const { data: pageFiles } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                  page: page,
                });
                files = files.concat(pageFiles);
                if (pageFiles.length < 100) break;
                page++;
              }

              // 3. Construct diff
              const diff = files.map(f =>
                `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
              ).join('\n\n');

              // 4. Save to file
              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);

              console.log(`Fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              console.error('Error fetching PR diff:', error);
              core.setFailed(`Failed to get PR diff: ${error.message}`);
            }

      - name: Review with Jules (Gemini)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            try {
              const prNumber = Number(process.env.PR_NUMBER);
              if (!prNumber) {
                console.error('Invalid PR number.');
                core.setFailed('Invalid PR number');
                return;
              }

              // 1. Read diff from file
              let diff = '';
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (readError) {
                console.error('Error reading pr_diff.txt:', readError);
                core.setFailed('Could not read PR diff file');
                return;
              }

              // 2. Validate API key
              if (!process.env.GOOGLE_API_KEY) {
                console.error('GOOGLE_API_KEY is missing.');
                core.setFailed('GOOGLE_API_KEY is not set');
                return;
              }

              console.log(`Sending PR #${prNumber} diff to Gemini for review...`);

              // 3. Call Gemini API
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${process.env.GOOGLE_API_KEY}`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    contents: [{
                      parts: [{
                        text: `You are a code reviewer. Review the following PR diff. ` +
                              `Identify bugs, security issues, style problems, and suggest improvements. ` +
                              `Be concise and actionable.\n\nPR Diff:\n${diff}`
                      }]
                    }],
                    generationConfig: { maxOutputTokens: 4096 },
                  }),
                }
              );

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Gemini API responded with ${response.status}: ${errorText}`);
              }

              const result = await response.json();
              const review = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

              // 4. Create pull request review
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Jules Review\n\n${review}`,
              });

              console.log(`Successfully posted Jules review for PR #${prNumber}.`);
            } catch (error) {
              console.error('Error during Jules review:', error);
              core.setFailed(`Review process failed: ${error.message}`);
            }
