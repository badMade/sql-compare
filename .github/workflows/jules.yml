name: Jules Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (
          github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@jules')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve PR number from pull_request or issue_comment event context
            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            // Skip regular issue comments that are not on pull requests
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('Comment on a regular issue, skipping.');
              return;
            }

            // Paginate through all changed files to build a complete diff
            let allFiles = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
                page,
              });
              allFiles = allFiles.concat(batch);
              if (batch.length < 100) break;
              page++;
            }
            const diff = allFiles.map(f =>
              `--- ${f.filename}\n+++ ${f.filename}\n${f.patch || '(binary)'}`
            ).join('\n\n');
            core.setOutput('diff', diff);
            // Step outputs are always strings; explicit cast documents intent.
            core.setOutput('pr_number', String(prNumber));

      - name: Review with Jules
        uses: actions/github-script@v7
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            // Env vars (from step outputs) are always strings; cast back to number.
            const prNumber = Number(process.env.PR_NUMBER);

            if (!prNumber) {
              core.setFailed('Invalid PR number: review step cannot run without a valid PR number');
              return;
            }

            // Call the Google Gemini API; the API key is passed via the
            // x-goog-api-key header so it is never exposed in URLs or logs.
            let response;
            try {
              response = await fetch(
                'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': process.env.GOOGLE_API_KEY,
                  },
                  body: JSON.stringify({
                    contents: [{
                      parts: [{
                        text: 'You are a code reviewer. Review the following PR diff. ' +
                          'Identify bugs, security issues, style problems, and suggest improvements. ' +
                          `Be concise and actionable.\n\nPR Diff:\n${diff}`,
                      }],
                    }],
                    generationConfig: { maxOutputTokens: 4096 },
                  }),
                }
              );
            } catch (err) {
              core.setFailed(`Failed to call Google Gemini API: ${err.message}`);
              return;
            }

            if (!response.ok) {
              core.setFailed(`Google Gemini API returned HTTP ${response.status}`);
              return;
            }

            const result = await response.json();
            const review =
              result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

            // Post the review as a PR comment
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Jules Review\n\n${review}`,
              });
            } catch (err) {
              core.setFailed(`Failed to post review comment: ${err.message}`);
            }
