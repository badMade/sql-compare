name: Jules Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # Use full history so diff generation and labels remain accurate for forks and rebases.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load utilities
        id: utils
        uses: actions/github-script@v7
        with:
          script: |
            const { fetchPullRequestDiff } = require('./.github/scripts/review-utils');
            core.setOutput('loaded', Boolean(fetchPullRequestDiff));

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const { fetchPullRequestDiff } = require('./.github/scripts/review-utils');

            try {
              const { prNumber, diff, files } = await fetchPullRequestDiff({ github, context, core });

              if (!diff) {
                core.setFailed('No diff available');
                return;
              }

              core.info(`Prepared diff for PR #${prNumber} with ${files.length} files.`);
              core.setOutput('diff', diff);
              core.setOutput('pr_number', prNumber);
            } catch (error) {
              const message = error && error.message ? error.message : String(error);
              core.setFailed(`Failed to build diff: ${message}`);
            }

      - name: Review with Jules (Gemini)
        if: secrets.GOOGLE_API_KEY != ''
        uses: actions/github-script@v7
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            const prNumber = Number(process.env.PR_NUMBER);

            if (!process.env.GOOGLE_API_KEY) {
              core.setFailed('GOOGLE_API_KEY is required');
              return;
            }

            if (!prNumber) {
              core.setFailed('Invalid PR number');
              return;
            }

            core.info(`Submitting diff for PR #${prNumber} to Gemini API`);

            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GOOGLE_API_KEY, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                contents: [{
                  role: 'user',
                  parts: [{
                    text: `You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.\n\nPR Diff:\n${diff}`
                  }]
                }],
                generationConfig: { maxOutputTokens: 4096 },
              }),
            });

            if (!response.ok) {
              core.debug(`Request URL: ${response.url}`);
              core.setFailed(`Gemini API request failed with status ${response.status} ${response.statusText}`);
              return;
            }

            const result = await response.json();
            const review = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

            core.info('Received response from Gemini API');

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Jules Review\n\n${review}`,
            });
