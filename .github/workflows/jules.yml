name: Jules Review

on:
  pull_request:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    # Run only on internal PRs with the label, OR when @jules is mentioned.
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review') ||
          contains(github.event.pull_request.title, '@jules') ||
          contains(github.event.pull_request.body, '@jules')
        )
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@jules') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.comment.body, '@jules') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const {
              buildDiffString,
              fetchPrFilesWithPagination,
              parsePrNumber,
              safeErrorMessage,
            } = require('./.github/actions/review-utils');

            try {
              if (context.eventName === 'issue_comment' && !context.payload.issue?.pull_request) {
                core.info('Comment on a regular issue; skipping Jules review.');
                return;
              }

              const prNumber = parsePrNumber(context.payload);
              const files = await fetchPrFilesWithPagination(github, context, prNumber, core);
              const diff = buildDiffString(files);

              fs.writeFileSync('pr_diff.txt', diff);
              core.setOutput('pr_number', prNumber);

              core.info(`Fetched diff for PR #${prNumber} (${files.length} files).`);
            } catch (error) {
              const message = safeErrorMessage(error);
              core.error(`Error fetching PR diff: ${message}`);
              core.setFailed(`Failed to get PR diff: ${message}`);
            }

      - name: Review with Jules (Gemini)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PR_NUMBER: ${{ steps.diff.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const {
              fetchWithRetry,
              isJsonResponse,
              normalizePrNumber,
              safeErrorMessage,
              safeReadBody,
            } = require('./.github/actions/review-utils');

            try {
              const prNumber = normalizePrNumber(process.env.PR_NUMBER);

              let diff;
              try {
                diff = fs.readFileSync('pr_diff.txt', 'utf8');
              } catch (readError) {
                const message = safeErrorMessage(readError);
                core.setFailed(`Could not read PR diff file: ${message}`);
                return;
              }

              if (!process.env.GOOGLE_API_KEY) {
                core.setFailed('GOOGLE_API_KEY is not set');
                return;
              }

              core.info(`Sending PR #${prNumber} diff to Gemini for review...`);

              const response = await fetchWithRetry(
                () =>
                  fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${process.env.GOOGLE_API_KEY}`,
                    {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({
                        contents: [
                          {
                            parts: [
                              {
                                text:
                                  'You are a code reviewer. Review the following PR diff. ' +
                                  'Identify bugs, security issues, style problems, and suggest improvements. ' +
                                  `Be concise and actionable.\n\nPR Diff:\n${diff}`,
                              },
                            ],
                          },
                        ],
                        generationConfig: { maxOutputTokens: 4096 },
                      }),
                    }
                  ),
                { retries: 2, delayMs: 2000 }
              );

              if (!response?.ok) {
                const errorText = await safeReadBody(response);
                throw new Error(`Gemini API responded with ${response?.status}: ${errorText}`);
              }

              if (!isJsonResponse(response)) {
                const bodyText = await safeReadBody(response);
                throw new Error(`Gemini API returned non-JSON response: ${bodyText}`);
              }

              // Parse JSON response with content-type validation
              const result = await parseJsonResponse(response);
              const review = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: `## Jules Review\n\n${review}`,
              });

              core.info(`Successfully posted Jules review for PR #${prNumber}.`);
            } catch (error) {
              const message = safeErrorMessage(error);
              core.error(`Error during Jules review: ${message}`);
              core.setFailed(`Review process failed: ${message}`);
            }
