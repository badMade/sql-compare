name: Jules Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'safe-for-ai-review')
      ) || (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Gemini
        uses: actions/github-script@v7
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          script: |
            const apiKey = process.env.GOOGLE_API_KEY;
            if (!apiKey) {
              core.warning('Missing GOOGLE_API_KEY secret — skipping Gemini review.');
              return;
            }

            const prNumber = context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('Comment on a regular issue, skipping.');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const diff = files.map(f => {
              const status = f.status === 'removed' ? 'DELETED' : f.status.toUpperCase();
              return `--- ${f.filename} (${status})\n${f.patch || ''}`;
            }).join('\n\n');

            if (!diff.trim()) {
              console.log('No diff content found, skipping review.');
              return;
            }

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{
                      text: `You are a code reviewer. Review the following PR diff. Identify bugs, security issues, style problems, and suggest improvements. Be concise and actionable.\n\nPR Diff:\n${diff}`
                    }]
                  }],
                  generationConfig: { maxOutputTokens: 4096 },
                }),
              }
            );

            if (!response.ok) {
              const errorBody = await response.text();
              if (response.status === 403) {
                core.setFailed('Gemini review request failed: Forbidden (403). Check that GOOGLE_API_KEY is valid and has Gemini API access enabled.');
              } else {
                core.setFailed(`Gemini review request failed (${response.status}): ${errorBody}`);
              }
              return;
            }

            const result = await response.json();
            const review = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Unable to generate review.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: `## Jules Review\n\n${review}`,
            });
